name: Deploy to GitHub Pages

# main에 push되면 정적 export를 빌드해 GitHub Pages로 배포한다.
# PR에서는 빌드만 돌려 검증한다(배포 없음).
#
# 빌드 검증이 PR에서 돌아야 하는 이유: `output: "export"`는 프로덕션 빌드에서만 켜지므로
# (next.config.ts 참고) 정적 export 비호환 코드는 `next dev`에서 드러나지 않는다.
# PR 빌드가 없으면 main에 머지된 뒤 배포가 실패해야 알게 된다.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# GitHub Pages 배포에 필요한 최소 권한.
permissions:
  contents: read
  pages: write
  id-token: write

# 배포는 한 번에 하나만. 진행 중 배포는 취소하지 않고 큐잉한다.
# PR 빌드는 브랜치별로 따로 묶어 배포 큐를 막지 않게 한다.
concurrency:
  group: pages-${{ github.event_name == 'pull_request' && github.ref || 'main' }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export (out/)
        run: npm run build
        env:
          # 공개 키(빌드 시 클라이언트 번들로 인라인). repo → Settings →
          # Secrets and variables → Actions → Variables 에 등록.
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: SPA fallback for client-only routes
        # 정적 호스트에서 /posts/<id>/ 새로고침·딥링크가 하드 404 나지 않도록
        # 앱 셸(index.html)을 404.html로 복사한다. 클라이언트 라우터가 부팅되고,
        # 로그인 세션으로 서버(Supabase)에서 글을 불러온다. 없으면 '/'로 되돌린다.
        # 주의: 이 경로는 HTTP 상태가 404다(화면은 정상). 근본 해결은 docs/BACKLOG.md 참고.
        run: cp out/index.html out/404.html

      - name: Disable Jekyll (_next/ 폴더 보존)
        run: touch out/.nojekyll

      # 아래 두 단계와 deploy 잡은 배포 전용이라 PR에서는 건너뛴다.
      # PR은 위 빌드까지만 돌려 정적 export가 깨지지 않았는지 확인한다.
      - name: Setup Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
